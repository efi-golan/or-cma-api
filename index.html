<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMA – אור נכסים</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#08212d;--cyan:#25bbec;--gold:#dab375;
  --navy2:#0d2d3d;--navy3:#122838;
  --border:rgba(218,179,117,0.18);
  --cyan-dim:rgba(37,187,236,0.10);
  --text:#e8f4f8;--muted:rgba(232,244,248,0.52);
}
body{background:var(--navy);color:var(--text);font-family:"Assistant",sans-serif;direction:rtl;min-height:100vh;overflow-x:hidden}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:100}
.topbar img{height:26px;width:auto}
.topbar-info{display:flex;flex-direction:column}
.topbar-title{font-size:13px;font-weight:800;color:var(--gold)}
.topbar-sub{font-size:9px;color:var(--muted);font-weight:600}
.topbar-right{margin-right:auto;display:flex;align-items:center;gap:8px}
.btn-new{background:var(--gold);color:var(--navy);font-size:12px;font-weight:900;padding:7px 16px;border-radius:3px;cursor:pointer;border:none;font-family:inherit}
.btn-new:hover{opacity:.88}
.status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* LAYOUT */
.layout{display:grid;grid-template-columns:370px 1fr;height:calc(100vh - 54px)}
.sidebar{background:var(--navy3);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{overflow-y:auto;padding:20px;background:var(--navy)}

/* FREE TEXT */
.freetext-panel{padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(37,187,236,.04)}
.freetext-label{font-size:10px;font-weight:800;color:var(--cyan);letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-badge{background:var(--cyan);color:var(--navy);font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px}
.freetext-area{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(37,187,236,.22);border-radius:5px;padding:9px 11px;font-size:12px;color:var(--text);font-family:inherit;direction:rtl;resize:vertical;min-height:68px;line-height:1.5}
.freetext-area:focus{outline:none;border-color:var(--cyan)}
.freetext-area::placeholder{color:var(--muted)}
.freetext-btn{width:100%;margin-top:6px;background:var(--cyan);border:none;color:var(--navy);font-weight:900;font-size:12px;padding:8px;border-radius:4px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.freetext-btn:hover{opacity:.85}
.freetext-btn:disabled{opacity:.4;cursor:default}

/* CHAT */
.chat-area{flex:1;padding:12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}
.bubble{padding:9px 12px;border-radius:10px;font-size:12.5px;line-height:1.55;max-width:93%}
.bubble.bot{background:var(--cyan-dim);border:1px solid rgba(37,187,236,.18);align-self:flex-start;border-radius:4px 10px 10px 10px}
.bubble.user{background:rgba(218,179,117,.10);border:1px solid rgba(218,179,117,.18);align-self:flex-end;border-radius:10px 4px 10px 10px}
.bubble b{color:var(--cyan)}
.bubble.extract{border-right:3px solid var(--cyan);background:rgba(37,187,236,.07)}
.quick-btns{padding:6px 12px;display:flex;flex-wrap:wrap;gap:5px}
.qbtn{background:rgba(37,187,236,.09);border:1px solid rgba(37,187,236,.2);color:var(--cyan);font-size:11px;font-weight:700;padding:4px 9px;border-radius:4px;cursor:pointer;font-family:inherit}
.qbtn:hover{background:rgba(37,187,236,.17)}
.chat-input-row{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:6px}
.chat-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:4px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;direction:rtl}
.chat-inp:focus{outline:none;border-color:var(--cyan)}
.chat-send{background:var(--cyan);border:none;color:var(--navy);font-weight:900;font-size:12px;padding:8px 14px;border-radius:4px;cursor:pointer;font-family:inherit}

/* API KEY */
.api-area{padding:9px 12px;border-top:1px solid var(--border)}
.api-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.api-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:3px;padding:6px 8px;font-size:11px;color:var(--text);direction:ltr;font-family:inherit}
.api-inp:focus{outline:none;border-color:var(--cyan)}

/* REPORT */
.rpt-header{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0 16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.rpt-title{font-size:16px;font-weight:900}
.rpt-addr{font-size:11px;color:var(--muted);margin-top:2px}
.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px}
.chip-col{background:rgba(218,179,117,.1);color:var(--gold);border:1px solid rgba(218,179,117,.25)}
.chip-gen{background:rgba(37,187,236,.1);color:var(--cyan);border:1px solid rgba(37,187,236,.25)}
.blink{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.actions-row{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:4px;font-size:12px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-cyan{background:var(--cyan);color:var(--navy)}
.btn-cyan:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--cyan);color:var(--cyan)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:default}

/* PROP GRID */
.section{margin-bottom:20px}
.s-head{display:flex;align-items:center;gap:6px;margin-bottom:9px;border-bottom:1px solid var(--border);padding-bottom:6px}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan)}
.s-head h2{font-size:12.5px;font-weight:800;color:var(--gold);letter-spacing:.05em}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.prop-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:7px 10px}
.prop-box .l{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.07em;margin-bottom:1px}
.prop-box .v{font-size:13px;font-weight:800}

/* MISSING FIELDS */
.missing-section{background:rgba(218,179,117,.07);border:1px solid rgba(218,179,117,.22);border-radius:5px;padding:10px 12px;margin-bottom:14px}
.missing-title{color:var(--gold);font-weight:800;font-size:11px;letter-spacing:.06em;margin-bottom:8px}
.miss-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.miss-label{font-size:11px;color:var(--muted);font-weight:700;min-width:58px;flex-shrink:0}
.miss-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:3px;padding:5px 8px;font-size:12px;color:var(--text);font-family:inherit;direction:rtl}
.miss-inp:focus{outline:none;border-color:var(--gold)}
.miss-complete{background:var(--gold);border:none;color:var(--navy);font-weight:900;font-size:11px;padding:6px 14px;border-radius:3px;cursor:pointer;margin-top:6px;font-family:inherit}

/* PRICE BAR */
.price-bar{background:var(--navy3);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:16px}
.price-row{display:flex;justify-content:space-around;align-items:center}
.price-col{text-align:center}
.price-col .pl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.07em;margin-bottom:3px}
.price-col .pv{font-size:17px;font-weight:900}
.pv-fast{color:var(--gold)}
.pv-real{color:var(--cyan);font-size:22px!important}
.pv-ceil{color:#7dd3fc}
.price-sep{width:1px;height:36px;background:var(--border)}

/* TX TABLE */
.tx-wrap{overflow-x:auto}
.tx-table{width:100%;border-collapse:collapse;font-size:11.5px}
.tx-table th{background:rgba(37,187,236,.07);color:var(--muted);font-weight:700;font-size:10px;padding:7px 8px;text-align:right;border-bottom:1px solid var(--border)}
.tx-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;vertical-align:middle}
.tx-table tr:hover td{background:rgba(255,255,255,.025)}
.tx-table tr.removed td{opacity:.28;text-decoration:line-through}
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px}
.bh{background:rgba(37,187,236,.14);color:var(--cyan);border:1px solid rgba(37,187,236,.28)}
.bm{background:rgba(218,179,117,.11);color:var(--gold);border:1px solid rgba(218,179,117,.28)}
.bl{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
.rm-btn{background:none;border:1px solid rgba(255,80,80,.28);color:rgba(255,120,120,.65);font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;font-family:inherit}

/* ANALYSIS */
.analysis-box{background:rgba(37,187,236,.05);border:1px solid rgba(37,187,236,.18);border-radius:4px;padding:13px;font-size:12.5px;line-height:1.7}

/* LOADER / TOAST */
.loader{display:inline-block;width:13px;height:13px;border:2px solid rgba(37,187,236,.28);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy3);border:1px solid var(--cyan);color:var(--text);padding:8px 16px;border-radius:5px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:6px;padding:22px;width:520px;max-width:94vw}
.modal h3{font-size:15px;font-weight:900;color:var(--gold);margin-bottom:13px;display:flex;justify-content:space-between;align-items:center}
.modal-x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;font-family:inherit}
.mi-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.07em;margin-bottom:4px;margin-top:10px}
.mi-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:7px 9px;font-size:12px;color:var(--text);direction:ltr;font-family:inherit}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35}
</style>
</head>

<script>
// ═══ STATE ═══════════════════════════════════════════
const S = {
  id: null, property: {}, transactions: null,
  pricing: null, analysis: null, step: 0, status: 'idle'
};

const GOVMAP = 'https://www.govmap.gov.il/api';

const QUESTIONS = [
  {key:'city',         q:'באיזה <b>יישוב</b> נמצא הנכס?',     opts:null},
  {key:'neighborhood', q:'<b>שכונה</b>? (אפשר לדלג)',           opts:null},
  {key:'street',       q:'שם <b>הרחוב</b>?',                   opts:null},
  {key:'houseNumber',  q:'<b>מספר הבית</b>?',                  opts:null},
  {key:'type',         q:'<b>סוג הנכס</b>?',                   opts:['דירה','בית פרטי','פנטהאוז','דופלקס','מגרש']},
  {key:'floor',        q:'<b>קומה</b>?',                       opts:null},
  {key:'rooms',        q:'כמה <b>חדרים</b>?',                  opts:null},
  {key:'area',         q:'<b>שטח</b> מ"ר?',                    opts:null},
  {key:'parking',      q:'<b>חניות</b>? (אפשר לדלג)',          opts:null},
  {key:'safeRoom',     q:'יש <b>ממ"ד</b>?',                    opts:['כן','לא','לא ידוע']},
  {key:'balcony',      q:'יש <b>מרפסת</b>?',                   opts:['כן','לא','לא ידוע']},
  {key:'balconySize',  q:'<b>גודל המרפסת</b> במ"ר? (אפשר לדלג)',opts:null},
  {key:'storage',      q:'יש <b>מחסן</b>? (אפשר לדלג)',        opts:['כן','לא']},
  {key:'notes',        q:'<b>הערות</b> נוספות? (אפשר לדלג)',   opts:null},
];

const LABELS = {city:'יישוב',neighborhood:'שכונה',street:'רחוב',houseNumber:'מס׳ בית',
  type:'סוג',floor:'קומה',rooms:'חדרים',area:'שטח מ"ר',parking:'חניות',
  safeRoom:'ממ"ד',balcony:'מרפסת',balconySize:'גודל מרפסת',storage:'מחסן',notes:'הערות'};

// ═══ INIT ════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('cma_key');
  if (saved) document.getElementById('apiKey').value = saved;
  addBubble('bot', 'שלום! מערכת CMA של <b>אור נכסים</b>.<br>לחץ <b>+ דוח חדש</b> או הכנס טקסט חופשי.')
  // Global click delegation - survives all DOM re-renders
  document.addEventListener('click', function(e) {
    const qbtn = e.target.closest('.qbtn[data-idx]');
    if (qbtn) {
      const i = parseInt(qbtn.dataset.idx);
      const b = window._qbtns || [];
      if (b[i]) handleQ(b[i].a);
      return;
    }
    if (e.target.id === 'missCompleteBtn') { completeMissing(); return; }
    if (e.target.classList.contains('rm-btn')) {
      removeTx(e.target.dataset.scope, parseInt(e.target.dataset.idx));
      return;
    }
  });
});

function saveKey() {
  localStorage.setItem('cma_key', document.getElementById('apiKey').value);
}

function getKey() {
  return document.getElementById('apiKey').value.trim();
}

// ═══ REPORT START ═════════════════════════════════════
function startNew() {
  initReport();
  addBubble('bot', 'דוח חדש נפתח!<br>הכנס <b>טקסט חופשי</b> למעלה, או ענה על שאלות:');
  setTimeout(nextQ, 500);
}

function initReport() {
  // Silent init - no chat, no questions. Used by freetext flow.
  S.id = Math.random().toString(36).slice(2, 10);
  S.property = {}; S.transactions = null; S.pricing = null;
  S.analysis = null; S.envAnalysis = null; S.envBoost = 0;
  S.step = QUESTIONS.length; // Start at end - no questions by default
  S.status = 'collecting';
  clearChat();
  renderReport();
}

// ═══ FREE TEXT ════════════════════════════════════════
async function processFreeTextWithInput(text) {
  // Route bottom-input text to processFreeText
  const ftxt = document.getElementById('ftxt');
  if (ftxt) ftxt.value = text;
  await processFreeText();
}


function parseAddressManually(text) {
  // Manual Hebrew address parser - no AI needed
  const result = {};
  
  // City - look for known city patterns
  const cities = ['תל אביב','ירושלים','חיפה','ראשון לציון','פתח תקווה','אשדוד','נתניה','באר שבע','בני ברק','רמת גן','רחובות','רעננה','כפר סבא','הרצליה','חולון','בת ים','אשקלון','נס ציונה','יבנה','לוד','רמלה','מודיעין','אלעד','גבעתיים','קריית גת','הוד השרון','טבריה','נצרת','עפולה','קריית אתא'];
  for (const city of cities) {
    if (text.includes(city)) { result.city = city; break; }
  }
  
  // Street number: look for "רחוב X Y" or "X Y" pattern
  const streetMatch = text.match(/רחוב\s+([\u05D0-\u05EA\s]+?)\s+(\d+)/);
  if (streetMatch) {
    result.street = streetMatch[1].trim();
    result.houseNumber = streetMatch[2];
  } else {
    // Try "ברחוב X"
    const m2 = text.match(/ברחוב\s+([\u05D0-\u05EA\s]+?)(?:\s+(\d+))?/);
    if (m2) { result.street = m2[1].trim(); if (m2[2]) result.houseNumber = m2[2]; }
  }
  
  // Rooms
  const roomsMatch = text.match(/(\d+(?:\.5)?)\s*חד/);
  if (roomsMatch) result.rooms = roomsMatch[1];
  
  // Floor - store just the number
  const floorMatch = text.match(/קומה\s*(\d+)/);
  if (floorMatch) result.floor = floorMatch[1]; // Just the number
  
  // Area
  const areaMatch = text.match(/(\d+)\s*מ[""׳]ר/);
  if (areaMatch) result.area = areaMatch[1];
  
  // Neighborhood
  const nbMatch = text.match(/שכונת?\s+([\u05D0-\u05EA\s]+?)(?:\s+רחוב|\s+ב|,|$)/);
  if (nbMatch) result.neighborhood = nbMatch[1].trim();
  
  // Type
  if (text.includes('פנטהאוז')) result.type = 'פנטהאוז';
  else if (text.includes('דופלקס')) result.type = 'דופלקס';
  else if (text.includes('בית פרטי') || text.includes('קוטג')) result.type = 'בית פרטי';
  else if (text.includes('דירה') || text.includes('חד')) result.type = 'דירה';
  
  // Parking
  const parkMatch = text.match(/(\d+)\s*חניה|חניה\s*(\d+)/);
  if (parkMatch) result.parking = parkMatch[1] || parkMatch[2];
  else if (text.includes('חניה')) result.parking = '1';
  
  // safeRoom
  if (text.includes('ממ"ד') || text.includes('ממד')) result.safeRoom = 'כן';
  
  // Balcony
  if (text.includes('מרפסת')) result.balcony = 'כן';
  
  return result;
}

async function processFreeText() {
  const text = document.getElementById('ftxt').value.trim();
  if (!text) return toast('הכנס תיאור נכס');
  const key = getKey();
  
  if (!S.id) { initReport(); await new Promise(r => setTimeout(r, 50)); }
  
  // If no API key - use manual parser
  if (!key) {
    addBubble('user', text.length > 120 ? text.slice(0,120)+'...' : text);
    const extracted = parseAddressManually(text);
    const filled = [], missing = [];
    for (const [k,v] of Object.entries(extracted)) {
      if (v) { S.property[k] = v; if(LABELS[k]) filled.push(LABELS[k]+': '+v); }
    }
    if (!filled.length) {
      addBubble('bot', '⚠️ לא הצלחתי לזהות פרטים. נסה: "דירה 4 חדרים קומה 3 רחוב הרצל 12 רחובות"<br>או הכנס <b>Claude API Key</b> לניתוח חכם יותר.');
      S.step = 0;
      nextQ();
      return;
    }
    addBubble('bot', '✅ זיהיתי (ללא AI):<br>'+filled.join('<br>'), 'extract');
    document.getElementById('ftxt').value = '';
    const required = ['city','street'];
    for (const f of required) if (!S.property[f]) missing.push({key:f, label:LABELS[f]});
    const optFields = ['rooms','area','floor','type'];
    const missingOpt = optFields.filter(f => !S.property[f]);
    if (missingOpt.length >= 2) missingOpt.forEach(f => missing.push({key:f, label:LABELS[f]}));
    renderReport();
    if (missing.length) { showMissing(missing); addBubble('bot', 'חסרים '+missing.length+' שדות:'); }
    else { S.step = QUESTIONS.length; addBubble('bot','✅ לחץ <b>🔍 חפש עסקאות</b>!'); setQbtns([{l:'🔍 חפש עסקאות',a:'gen'}]); }
    return;
  }
  const btn = document.getElementById('ftxBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> מנתח...';
  addBubble('user', text.length > 120 ? text.slice(0, 120) + '...' : text);

  try {
    const prompt = `חלץ פרטי נכס נדל"ן בישראל מהטקסט הבא. החזר JSON בלבד ללא הסברים:
{"city":null,"neighborhood":null,"street":null,"houseNumber":null,"type":null,"floor":null,"rooms":null,"area":null,"parking":null,"safeRoom":null,"balcony":null,"balconySize":null,"storage":null,"notes":null}
אם פרט לא מופיע – null. type: דירה/בית פרטי/פנטהאוז/דופלקס/מגרש. safeRoom/balcony/storage: כן/לא/לא ידוע. balconySize: גודל המרפסת במ"ר אם צוין (מספר בלבד).
טקסט: ${text}`;

    const resp = await callClaude(prompt, 400);
    const jm = resp.match(/\{[\s\S]+\}/);
    if (!jm) throw new Error('לא הצלחתי לחלץ');
    const ex = JSON.parse(jm[0]);

    // Apply extracted values
    const filled = [], missing = [];
    for (const [k, v] of Object.entries(ex)) {
      if (v && v !== 'null') {
        S.property[k] = v;
        if (LABELS[k]) filled.push(LABELS[k] + ': ' + v);
      }
    }

    // Show extracted
    if (filled.length) {
      addBubble('bot', '✅ <b>חולץ:</b><br>' + filled.join('<br>'), 'extract');
    }

    // Find missing important fields
    const required = ['city', 'street'];
    const optFields = ['rooms', 'area', 'floor', 'type'];
    for (const f of required) {
      if (!S.property[f]) missing.push({key: f, label: LABELS[f]});
    }
    // Only ask optional fields if 2+ are missing
    const missingOpt = optFields.filter(f => !S.property[f]);
    if (missingOpt.length >= 2) missingOpt.forEach(f => missing.push({key: f, label: LABELS[f]}));

    renderReport();
    document.getElementById('ftxt').value = '';

    if (missing.length) {
      showMissing(missing);
      addBubble('bot', `חסרים <b>${missing.length}</b> שדות חשובים – השלם אותם:`);
    } else {
      S.step = QUESTIONS.length;
      addBubble('bot', '✅ כל הפרטים מולאו! לחץ <b>🔍 חפש עסקאות</b>.');
      setQbtns([{l:'🔍 חפש עסקאות', a:'gen'}]);
    }
  } catch(e) {
    addBubble('bot', '❌ ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 נתח ומלא פרטים אוטומטית';
  }
}

function showMissing(fields) {
  // Remove existing
  document.querySelector('.missing-section')?.remove();
  let html = '<div class="missing-section"><div class="missing-title">📝 השלם פרטים חסרים</div>';
  for (const f of fields) {
    html += `<div class="miss-row"><label class="miss-label">${f.label}:</label>
      <input class="miss-inp" id="ms_${f.key}" placeholder="${f.label}...">
    </div>`;
  }
  html += '<button class="miss-complete" id="missCompleteBtn">✅ עדכן והמשך</button></div>';
  const main = document.getElementById('main');
  const firstChild = main.firstChild;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const banner = tmp.firstChild;
  main.insertBefore(banner, firstChild);
  window._missingKeys = fields.map(f => f.key);
  // Add event listeners after DOM insertion
  // Use data attribute + global delegation (survives re-renders)
  window._missingKeys = fields.map(f => f.key);
}

function completeMissing() {
  for (const k of (window._missingKeys || [])) {
    const el = document.getElementById('ms_' + k);
    if (el && el.value.trim()) S.property[k] = el.value.trim();
  }
  document.querySelector('.missing-section')?.remove();
  renderReport();
  // Skip questions for all already-filled fields
  S.step = QUESTIONS.length;
  addBubble('bot', '✅ פרטים עודכנו! לחץ <b>🔍 חפש עסקאות</b>.');
  setQbtns([{l:'🔍 חפש עסקאות', a:'gen'}]);
  toast('פרטים עודכנו');
}

// ═══ CHAT FLOW ════════════════════════════════════════
function clearChat() {
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('qbtns').innerHTML = '';
}

function addBubble(who, html, cls='') {
  const el = document.createElement('div');
  el.className = 'bubble ' + who + (cls ? ' ' + cls : '');
  el.innerHTML = html;
  const area = document.getElementById('chatArea');
  area.appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function nextQ() {
  // Skip all questions for fields already filled (from free text or previous answers)
  while (S.step < QUESTIONS.length && S.property[QUESTIONS[S.step].key]) {
    S.step++;
  }
  if (S.step >= QUESTIONS.length) {
    // All done - check if we have minimum required
    if (S.property.city && S.property.street) {
      addBubble('bot', '✅ כל הפרטים הוכנסו! לחץ <b>חפש עסקאות</b>.');
      setQbtns([{l:'🔍 חפש עסקאות', a:'gen'}]);
    } else {
      addBubble('bot', 'חסרים <b>יישוב</b> ו<b>רחוב</b>. הכנס אותם:');
      S.step = 0; // restart from city
      askNextMissing();
    }
    return;
  }
  const q = QUESTIONS[S.step];
  addBubble('bot', q.q);
  if (q.opts) setQbtns([...q.opts.map(o => ({l:o, a:'ans:'+o})), {l:'דלג', a:'skip'}]);
  else setQbtns([{l:'דלג', a:'skip'}]);
  setTimeout(() => document.getElementById('chatInp').focus(), 60);
}

function askNextMissing() {
  // Find next truly missing field
  while (S.step < QUESTIONS.length && S.property[QUESTIONS[S.step].key]) S.step++;
  if (S.step >= QUESTIONS.length) {
    addBubble('bot', '✅ כל הפרטים! לחץ <b>חפש עסקאות</b>.');
    setQbtns([{l:'🔍 חפש עסקאות', a:'gen'}]);
    return;
  }
  const q = QUESTIONS[S.step];
  addBubble('bot', q.q);
  if (q.opts) setQbtns([...q.opts.map(o => ({l:o, a:'ans:'+o})), {l:'דלג', a:'skip'}]);
  else setQbtns([{l:'דלג', a:'skip'}]);
}

function setQbtns(btns) {
  window._qbtns = btns; // Store globally
  const container = document.getElementById('qbtns');
  container.innerHTML = '';
  btns.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'qbtn';
    btn.textContent = b.l;
    btn.dataset.idx = String(i);
    container.appendChild(btn);
  });
}



function handleQ(a) {
  if (a === 'skip') { S.step++; nextQ(); }
  else if (a === 'gen') generateReport();
  else if (a === 'analyze') analyzeReport();
  else if (a === 'pdf') exportPDF();
  else if (a.startsWith('ans:')) {
    const v = a.slice(4);
    addBubble('user', v);
    S.property[QUESTIONS[S.step].key] = v;
    S.step++;
    renderReport();
    setTimeout(nextQ, 250);
  }
}

function sendMsg() {
  const inp = document.getElementById('chatInp');
  const v = inp.value.trim();
  if (!v) return;
  inp.value = '';

  // No active report? treat as free text
  if (!S.id) {
    const ftxt = document.getElementById('ftxt');
    if (ftxt) ftxt.value = v;
    addBubble('user', v);
    addBubble('bot', 'מנסה לנתח כטקסט חופשי...');
    // Trigger free text processing with this input
    processFreeTextWithInput(v);
    return;
  }

  // Still collecting answers to questions
  if (S.step < QUESTIONS.length) {
    addBubble('user', v);
    S.property[QUESTIONS[S.step].key] = v;
    S.step++;
    renderReport();
    setTimeout(nextQ, 250);
    return;
  }

  // Report exists and all questions done
  addBubble('user', v);
  const lower = v.toLowerCase();
  if (lower.includes('חפש') || lower.includes('עסקא')) {
    generateReport();
  } else if (lower.includes('ניתוח') || lower.includes('ai')) {
    analyzeReport();
  } else {
    addBubble('bot', 'לחץ <b>🔍 חפש עסקאות</b> להמשיך.');
    setQbtns([{l:'🔍 חפש עסקאות', a:'gen'}]);
  }
}

// ═══ GOVMAP API ═══════════════════════════════════════
function parsePoint(shape) {
  if (!shape) return null;
  const m = shape.match(/POINT\(([0-9.]+)\s+([0-9.]+)\)/);
  return m ? [parseFloat(m[1]), parseFloat(m[2])] : null;
}

async function govPost(path, body) {
  const r = await fetch(GOVMAP + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Referer': 'https://www.govmap.gov.il/',
      'Origin': 'https://www.govmap.gov.il'
    },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function govGet(path) {
  const r = await fetch(GOVMAP + path, {
    headers: {'Referer': 'https://www.govmap.gov.il/'}
  });
  return r.json();
}

function normDeal(d, scope) {
  // Exact field names from nadlan-mcp models.py Deal class aliases:
  // dealAmount, dealDate, assetArea, assetRoomNum, settlementNameHeb,
  // streetName, houseNumber, floorNumber, neighborhood
  const price  = d.dealAmount || 0;
  const area   = d.assetArea || null;
  const rooms  = d.assetRoomNum !== undefined ? d.assetRoomNum : null;
  const floor  = d.floorNumber !== null && d.floorNumber !== undefined ? d.floorNumber :
                 (d.floor ? (parseInt(d.floor) || null) : null);
  const city   = d.settlementNameHeb || d.cityName || '';
  const stName = d.streetName || d.streetNameHeb || '';
  const houseN = String(d.houseNumber || d.houseNum || '');
  const addr   = (stName + (houseN ? ' ' + houseN : '')).trim();
  const date   = d.dealDate ? String(d.dealDate).slice(0,10) : '';
  
  if (!window._nl) {
    window._nl = true;
    console.log('[normDeal] KEYS:', Object.keys(d).join(', '));
    console.log('[normDeal] price=' + price + ' area=' + area + ' rooms=' + rooms + ' floor=' + floor + ' date=' + date + ' addr=' + addr);
  }
  return { address: addr, houseNumber: houseN, floor, rooms, area, price,
    pricePerSqm: (area && area > 0) ? Math.round(price / area) : null,
    date, neighborhood: d.neighborhood || '', city, scope, removed: false };
}

async function fetchTx(city, street, houseNumber) {
  // Step 1: Autocomplete - get ITM coordinates
  const searchText = street + ' ' + (houseNumber || '1') + ' ' + city;
  const fallbackText = street + ' ' + city;
  
  let acResults = [];
  for (const query of [searchText, fallbackText]) {
    try {
      const ac = await govPost('/search-service/autocomplete', {
        searchText: query, language: 'he', isAccurate: false, maxResults: 10
      });
      acResults = ac.results || [];
      if (acResults.length) break;
    } catch(e) { console.log('[ac] error:', e.message); }
  }
  if (!acResults.length) throw new Error('כתובת לא נמצאה: ' + searchText);
  console.log('[ac] found', acResults.length, 'results');
  console.log('[ac] first:', JSON.stringify(acResults[0]).slice(0,200));

  // Step 2: Try top-3 autocomplete results to find polygons (like nadlan-mcp)
  let point = null, polygons = [];
  const radii = [50, 200, 500, 1000, 2000];
  
  for (const result of acResults.slice(0, 3)) {
    const p = parsePoint(result.shape);
    if (!p) continue;
    
    for (const r of radii) {
      try {
        const raw = await govGet('/real-estate/deals/' + p[0] + ',' + p[1] + '/' + r);
        console.log('[deals r=' + r + '] raw type:', typeof raw, Array.isArray(raw) ? 'len='+raw.length : JSON.stringify(raw).slice(0,100));
        const arr = Array.isArray(raw) ? raw : (raw && typeof raw === 'object' ? Object.values(raw) : []);
        if (arr.length > 0) {
          point = p; polygons = arr;
          console.log('[deals] found', arr.length, 'polygons at r='+r, 'result:', result.text);
          console.log('[deals] first polygon:', JSON.stringify(arr[0]).slice(0,300));
          break;
        }
      } catch(e) { console.log('[deals r='+r+'] err:', e.message); }
    }
    if (polygons.length) break;
  }
  
  if (!point) {
    // Use first result even with no polygons - will show empty transactions
    point = parsePoint(acResults[0].shape);
    if (!point) throw new Error('לא נמצאו קואורדינטות לכתובת');
    console.log('[fallback] using point without polygons');
  }
  console.log('[point] x=' + point[0].toFixed(0) + ' y=' + point[1].toFixed(0) + ' polygons=' + polygons.length);

  // Step 3: Date range
  const now = new Date();
  const startDate = (now.getFullYear()-2) + '-' + String(now.getMonth()+1).padStart(2,'0');
  const endDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  let bDeals = [], sDeals = [], nDeals = [];

  if (polygons.length > 0) {
    // Extract polygon_id from first polygon - try all possible field names
    const poly0 = polygons[0];
    console.log('[polygon] keys:', Object.keys(poly0).join(', '));
    const polyId = String(
      poly0.polygon_id || poly0.polygonId || poly0.POLYGON_ID ||
      poly0.id || poly0.ID || poly0.objectid || poly0.OBJECTID || ''
    ).trim();
    console.log('[polygon] id=', polyId);

    if (polyId) {
      // Get street deals
      try {
        const sd = await govGet('/real-estate/street-deals/' + polyId +
          '?startDate=' + startDate + '&endDate=' + endDate + '&limit=30&dealType=2');
        console.log('[street-deals] type:', typeof sd, 'keys:', sd && typeof sd === 'object' ? Object.keys(sd).join(',') : '');
        const sdArr = Array.isArray(sd) ? sd : (sd && sd.data ? sd.data : (sd && Array.isArray(sd.deals) ? sd.deals : []));
        console.log('[street-deals] count:', sdArr.length);
        if (sdArr.length > 0) {
          console.log('[street-deals] first deal:', JSON.stringify(sdArr[0]).slice(0,300));
        }
        sdArr.forEach(d => {
          const hn = String(d.houseNumber || d.houseNum || '');
          if (houseNumber && hn === String(houseNumber)) bDeals.push(d);
          else sDeals.push(d);
        });
        bDeals = bDeals.slice(0,5);
        sDeals = sDeals.slice(0,8);
      } catch(e) { console.log('[street-deals] err:', e.message); }

      // Get neighborhood deals
      try {
        const nd = await govGet('/real-estate/neighborhood-deals/' + polyId +
          '?startDate=' + startDate + '&endDate=' + endDate + '&limit=20&dealType=2');
        const ndArr = Array.isArray(nd) ? nd : (nd && nd.data ? nd.data : []);
        nDeals = ndArr.filter(d => !(d.streetName || d.streetNameHeb || '').includes(street)).slice(0,8);
      } catch(e) { console.log('[nb-deals] err:', e.message); }
    }
  }

  return {
    building: bDeals.map(d => normDeal(d, 'building')),
    street: sDeals.map(d => normDeal(d, 'street')),
    neighborhood: nDeals.map(d => normDeal(d, 'neighborhood')),
    meta: { point, polygons: polygons.length, source: 'govmap.gov.il', fetchedAt: new Date().toISOString() }
  };
}

function calcPricing(tx) {
  const all = [...(tx.building||[]),...(tx.street||[])].filter(t => t.price>0 && !t.removed);
  const prices = all.map(t=>t.price).sort((a,b)=>a-b);
  const med = prices.length ? prices[Math.floor(prices.length/2)] : 0;
  return {
    fast: med ? Math.round(med*.92/10000)*10000 : 0,
    real: med ? Math.round(med*.97/10000)*10000 : 0,
    ceil: med ? Math.round(med*1.05/10000)*10000 : 0,
    count: prices.length, median: med
  };
}

async function callClaudeWithWebSearch(prompt, maxTokens, key) {
  // Full multi-turn loop to handle web_search tool use
  const messages = [{role: 'user', content: prompt}];
  let finalText = '';
  let iterations = 0;

  while (iterations < 5) {
    iterations++;
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        tools: [{type: 'web_search_20250305', name: 'web_search'}],
        messages: messages
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || 'Claude error');

    // Collect any text from this response
    const textBlocks = (d.content || []).filter(b => b.type === 'text');
    if (textBlocks.length) finalText += textBlocks.map(b => b.text).join('\n');

    // If stopped normally, we're done
    if (d.stop_reason === 'end_turn' || d.stop_reason === 'max_tokens') break;

    // If Claude wants to use tools, send tool results back
    if (d.stop_reason === 'tool_use') {
      const toolUseBlocks = (d.content || []).filter(b => b.type === 'tool_use');
      if (!toolUseBlocks.length) break;

      // Add assistant response to messages
      messages.push({role: 'assistant', content: d.content});

      // Build tool results
      const toolResults = toolUseBlocks.map(tb => ({
        type: 'tool_result',
        tool_use_id: tb.id,
        content: tb.input ? JSON.stringify(tb.input) : 'Search completed'
      }));
      messages.push({role: 'user', content: toolResults});
    } else {
      break;
    }
  }

  return {text: finalText};
}

async function callClaude(prompt, maxTokens=500) {
  const key = getKey();
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'Claude error');
  return d.content?.[0]?.text || '';
}

function matchScore(deal, prop) {
  let s = 0;
  if (prop.rooms && deal.rooms) { const d=Math.abs(parseFloat(prop.rooms)-parseFloat(deal.rooms)); if(d===0)s+=3;else if(d<=.5)s+=2;else if(d<=1)s+=1; }
  if (prop.area && deal.area) { const d=Math.abs(parseInt(prop.area)-parseInt(deal.area)); if(d<10)s+=3;else if(d<20)s+=2;else if(d<35)s+=1; }
  if (prop.floor && deal.floor!=null) { const d=Math.abs(parseInt(prop.floor)-parseInt(deal.floor)); if(d<=1)s+=2;else if(d<=2)s+=1; }
  return s>=6?{cls:'bh',lbl:'גבוה'}:s>=3?{cls:'bm',lbl:'בינוני'}:{cls:'bl',lbl:'נמוך'};
}

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Assistant",sans-serif;direction:rtl;background:#fff;color:#111;padding:28px;font-size:12px}
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid #08212d}
  .logo img{height:32px}.logo p{font-size:8px;color:#aaa;letter-spacing:.1em;margin-top:2px}
  h1{font-size:20px;font-weight:900;color:#08212d}
  .meta{font-size:11px;color:#666;margin-top:4px}
  h2{font-size:13px;font-weight:800;color:#08212d;margin:16px 0 8px;border-bottom:2px solid #25bbec;padding-bottom:3px}
  .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
  .pbox{background:#f5f7f9;border-radius:3px;padding:6px 9px}
  .pbox .l{font-size:8px;color:#999;font-weight:700;letter-spacing:.06em}
  .pbox .v{font-size:13px;font-weight:800;color:#08212d}
  .prices{background:#08212d;border-radius:5px;padding:14px;margin:14px 0;display:flex;justify-content:space-around}
  .pc{text-align:center}.pc .l{font-size:9px;color:rgba(255,255,255,.5);font-weight:700}
  .pc .v{font-size:18px;font-weight:900;margin-top:3px}
  .fast{color:#dab375}.real{color:#25bbec;font-size:22px!important}.ceil{color:#7dd3fc}
  .sep{width:1px;background:rgba(255,255,255,.12)}
  table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}
  th{background:#08212d;color:#25bbec;padding:6px 8px;text-align:right;font-size:10px}
  td{padding:6px 8px;border-bottom:1px solid #eee;text-align:right}
  tr:nth-child(even) td{background:#f9fafc}
  .analysis{background:#f0f9ff;border:1px solid #25bbec;border-radius:3px;padding:12px;font-size:11.5px;line-height:1.65;color:#1a3a4a}
  .footer{margin-top:24px;padding-top:10px;border-top:1px solid #ddd;display:flex;justify-content:space-between;font-size:9px;color:#aaa}
  </style></head><body>
  <div class="hdr">
    <div class="logo"><img src="${logo}" alt="אור נכסים"><p>אור נכסים &nbsp;•&nbsp; מבינים את הנכס שלך</p></div>
    <div style="text-align:left">
      <h1>נתונים השוואתיים</h1>
      <div class="meta">${p.type||'נכס'} – ${[p.street,p.houseNumber,p.city].filter(Boolean).join(' ')}</div>
      <div class="meta" style="color:#bbb;font-size:9px">הופק: ${new Date().toLocaleDateString('he-IL')}</div>
    </div>
  </div>
  <h2>פרטי הנכס</h2>
  <div class="pgrid">
    ${[['יישוב',p.city],['שכונה',p.neighborhood],['סוג',p.type],['חדרים',p.rooms],['שטח מ"ר',p.area],['קומה',p.floor ? 'קומה ' + String(p.floor).replace(/קומה\s*/,'') : null],['חניות',p.parking],['ממ"ד',p.safeRoom],['מרפסת',p.balcony]].filter(([,v])=>v).map(([l,v])=>`<div class="pbox"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('')}
  </div>
  ${(pr.fast||pr.real||pr.ceil)?`<div class="prices">
    <div class="pc"><div class="l">מחיר מהיר</div><div class="v fast">${fmt(pr.fast)}</div></div>
    <div class="sep"></div>
    <div class="pc"><div class="l">מחיר ריאלי ★</div><div class="v real">${fmt(pr.real)}</div></div>
    <div class="sep"></div>
    <div class="pc"><div class="l">מחיר תקרה</div><div class="v ceil">${fmt(pr.ceil)}</div></div>
  </div>`:''}
  ${tx?.building?.filter(d=>!d.removed).length?`<h2>עסקאות בניין</h2><table><thead><tr><th>כתובת</th><th>תאריך</th><th>מחיר</th><th>₪/מ"ר</th><th>שטח</th><th>חד׳</th><th>קומה</th></tr></thead><tbody>${mkRows(tx.building)}</tbody></table>`:''}
  ${tx?.street?.filter(d=>!d.removed).length?`<h2>עסקאות רחוב</h2><table><thead><tr><th>כתובת</th><th>תאריך</th><th>מחיר</th><th>₪/מ"ר</th><th>שטח</th><th>חד׳</th><th>קומה</th></tr></thead><tbody>${mkRows(tx.street)}</tbody></table>`:''}
  ${tx?.neighborhood?.filter(d=>!d.removed).length?`<h2>עסקאות שכונה</h2><table><thead><tr><th>כתובת</th><th>תאריך</th><th>מחיר</th><th>₪/מ"ר</th><th>שטח</th><th>חד׳</th><th>קומה</th></tr></thead><tbody>${mkRows(tx.neighborhood)}</tbody></table>`:''}
  ${S.analysis?`<h2>ניתוח מקצועי</h2><div class="analysis">${S.analysis.replace(/\n/g,'<br>')}</div>`:''}
  ${p.notes?`<h2>הערות</h2><div class="analysis" style="background:#fffbf0;border-color:#dab375">${p.notes}</div>`:''}
  <div class="footer">
    <span>מקור: govmap.gov.il | רשות המסים</span>
    <span>אור נכסים CMA</span>
    <span>הופק: ${new Date().toLocaleDateString('he-IL')}</span>
  </div>
  <script>window.onload=()=>setTimeout(()=>window.print(),900)<\/script>
  </body></html>`);
  w.document.close();
  toast('פותח PDF...');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
